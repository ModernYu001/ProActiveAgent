# ProActive 资讯监控 Agent —— 主配置
# 改这里就能调话题、频率、阈值和模型路由，无需改代码。

# ---- 用户关注画像：判断层会把它喂给 LLM，作为"贴心理解你"的依据 ----
user_profile: |
  我关注 AI agent / 大模型行业。最想第一时间知道：
  - GitHub 上 AI agent 领域真正在崛起的热点项目（不是旧项目的日常更新）。
  - 重大时政新闻，尤其是突发事件。
  - 全球值得关注的科技新闻，特别是 AI 行业的重要进展（新模型、重大发布、重要论文/收购）。
  - AI 领域独角兽公司的新闻（融资、估值、重大动作）。
  我讨厌：营销软文、旧闻翻炒、无信息量的标题党、同一件事被反复推送。

# ---- 调度：每个话题的轮询间隔（分钟）。突发类调高频，慢话题降频 ----
schedule:
  default_interval_min: 30
  critic_interval_hours: 24   # 后台评判/自省层多久复盘一次

# ---- 打扰预算：强制系统学会取舍 ----
budget:
  max_instant_pushes_per_day: 8   # 仅 delivery.send_every_run=false 时生效(每日即时推送上限)
  digest_hour: 8                  # "攒着"的条目在每天几点汇总成摘要(本地时间)

# ---- 投递策略 ----
delivery:
  send_every_run: true            # 每轮把本轮的推送条目直接发出(默认开), 不受每日预算限制
  max_per_run: 15                 # 单轮最多发多少条(防消息过长), 超出降级进摘要

# ---- 判断阈值（0-100）：>=push 立即推；>=digest 进摘要；否则丢弃 ----
thresholds:
  push: 72
  digest: 50

# ---- 模型路由 ----
# 模型 id 均经 list_models.py 在你账号上实测存在。判断层走 flash-lite(约600/天)，
# critic 用 2.5-flash(低频)。grok 对话接口暂有问题, 先不入路径(以后修好可做兜底)。
models:
  # 判断层（高频、量大）：优选 3.1-flash-lite, 逐级回退
  judge:
    provider: gemini
    preferred: gemini-3.1-flash-lite
    fallback:
      - gemini-2.5-flash-lite
      - gemini-2.5-flash
      - gemini-3-flash-preview
  # 摘要（当前未在热路径调用，保留占位）
  summarize:
    provider: gemini
    preferred: gemini-2.5-flash
    fallback:
      - gemini-2.5-flash-lite
  # 评判/自省层（低频、要稍强）：grok 主用, gemini 兜底
  critic:
    provider: grok
    preferred: grok-4.20-fast
    fallback:
      - grok-4.20-0309-non-reasoning   # 同 provider 回退
    fallback_provider: gemini
    fallback_models:                   # grok 全挂了再用 gemini
      - gemini-2.5-flash
      - gemini-3-flash-preview

# ---- 每日配额上限（每个 key/天）。本地按天计数，用尽自动降级，绝不超配额 ----
# 你有 2 个 Gemini key → flash-lite 实际每天约 600 次；配合批量判断足够高频盯梢。
quotas:
  gemini:
    gemini-3.1-flash-lite: 450   # 主力判断 (每 key 500/天, 留余量按 450 → 2 key 约 900/天)
    gemini-2.5-flash-lite: 100   # 兜底, 配额未确认先保守填
    gemini-2.5-flash: 10         # 稀缺, 给 critic / 兜底
    gemini-3-flash-preview: 10   # 稀缺, 兜底
  grok:
    grok: 40                     # grok-X 采集 + critic 兜底

# ---- 每分钟限频(RPM)：设计值取实际的 ~2/3 留余量。客户端自动节流 + 429 等待重试 ----
rate_limits:
  gemini:
    gemini-3.1-flash-lite: 10    # 实际 15
    gemini-2.5-flash-lite: 10
    gemini-2.5-flash: 3          # 实际 5
    gemini-3-flash-preview: 3    # 实际 5

# ---- 判断层：两段式(粗筛→读正文深判) ----
judge:
  batch_size: 15                 # 第一段粗筛: 标题+摘要, 批量
  triage_floor: 50               # 第一段≥此分才进第二段读正文(=digest线, 省调用)
  deep_max_chars: 4000           # 第二段喂模型的正文截断长度
  # 限频由 rate_limits(RPM) 统一节流, 此处无需额外 sleep

# ---- 个性化：越用越懂你 ----
personalize:
  source_prior_weight: 15        # 来源采纳率先验对分数的最大加减(±15)
  ema_alpha: 0.2                 # 来源采纳率滑动平均更新速率
  exploration_ratio: 0.15        # 即时推送名额里留给"高重要性但偏离口味"的探索比例
  explore_floor: 80              # 原始重要性≥此分者视为"高价值", 可进探索名额

# ---- 监控话题 ----
topics:
  - id: github_ai_agents
    name: "GitHub AI Agent 热点项目"
    type: github_trending
    enabled: true
    # AI 相关热点：抓"新锐项目 + 星标激增", 而非历史最高星
    queries:
      - "topic:ai-agent"
      - "topic:llm-agent"
      - "topic:autonomous-agents"
      - "topic:llm"
      - "topic:mcp"
      - "topic:rag"
      - "ai agent framework"
    created_within_days: 120   # "新项目"判定: 近 N 天创建
    surge_min_stars: 200       # 距上次抓取涨星≥此数 → 视为热点激增
    track_pool: 30             # 每个查询追踪前 N 个高星仓库(用于检测激增)
    top_n: 12
    interval_min: 720   # 半天一次足够，热点不会分钟级变化

  - id: github_companion
    name: "GitHub AI 陪伴机器人热点"
    type: github_trending
    enabled: true
    # 用主题标签精准命中 AI 情感陪伴/数字人项目(关键词 companion 噪音大)
    queries:
      - "topic:ai-companion"
      - "topic:ai-waifu"
      - "topic:character-ai"
      - "topic:ai-vtuber"
      - "topic:virtual-girlfriend"
      - "topic:digital-human"
      - "AI companion"
    created_within_days: 180   # 该领域较新, 窗口放宽
    surge_min_stars: 100       # 体量比主流 AI 小, 激增门槛调低
    track_pool: 30
    top_n: 10
    importance_hint: "AI 情感陪伴/虚拟伴侣/数字人/角色扮演项目优先；新框架、新玩法、快速涨星优先；纯书籍/工具类被命名为 companion 的噪音降权。"
    interval_min: 720

  # 三个新闻话题：每个 = Tavily 高频(主力) + grok-X 每天1次(补充)。
  # 两个源共享同一 name(显示合并)与 importance_hint(YAML 锚点复用)；去重会跨源合并同一事件。

  # —— 时政 / 突发 ——
  - id: politics_tavily
    name: "时政 / 突发新闻"
    type: tavily
    enabled: true
    tavily_topic: news
    search_depth: advanced       # 带回正文 raw_content, 供第二段深判; 每查询 2 点
    include_raw_content: true
    days: 1
    max_results: 10
    queries:
      - "breaking news politics"
      - "world politics geopolitics"
    interval_min: 720   # 2次/天 (advanced 2点 × 2查询 × 2次 × 30 = 240 点/月)
    importance_hint: &hint_pol "突发、重大政策、地缘冲突、选举结果优先；日常政情类降权。"
  - id: politics_x
    name: "时政 / 突发新闻"
    type: grok_x
    enabled: true
    max_results: 8
    queries:
      - "breaking political news"
      - "geopolitics"
    interval_min: 1440  # grok 从 X 拉, 每天1次
    importance_hint: *hint_pol

  # —— 科技 / AI 行业 ——
  - id: tech_tavily
    name: "全球科技 / AI 行业新闻"
    type: tavily
    enabled: true
    tavily_topic: news
    search_depth: advanced
    include_raw_content: true
    days: 1
    max_results: 10
    queries:
      - "AI model release breakthrough"
      - "OpenAI OR Anthropic OR Google DeepMind OR xAI"
    interval_min: 720   # 2次/天 (约 240 点/月)
    importance_hint: &hint_tech "新模型发布、重大产品、重要论文、巨头战略、重大收购优先。"
  - id: tech_x
    name: "全球科技 / AI 行业新闻"
    type: grok_x
    enabled: true
    max_results: 8
    queries:
      - "AI breaking news"
      - "new AI model launch"
    interval_min: 1440
    importance_hint: *hint_tech

  # —— AI 独角兽 ——
  - id: unicorn_tavily
    name: "AI 独角兽新闻"
    type: tavily
    enabled: true
    tavily_topic: news
    search_depth: advanced
    include_raw_content: true
    days: 2
    max_results: 10
    queries:
      - "AI startup funding round OR raises"
      - "AI unicorn valuation"
    interval_min: 720   # 2次/天 (约 240 点/月; 三者合计约 720/月 < 800 上限)
    importance_hint: &hint_uni "大额融资、新晋独角兽、估值变化、重大并购优先。"
  - id: unicorn_x
    name: "AI 独角兽新闻"
    type: grok_x
    enabled: true
    max_results: 8
    queries:
      - "AI startup funding"
      - "AI unicorn"
    interval_min: 1440
    importance_hint: *hint_uni

# ---- 去重 ----
dedup:
  title_similarity_threshold: 88   # 标题相似度(0-100)超过即视为同一事件
  lookback_days: 7                 # 在最近几天的已见条目里比对
